# Slack app manifest for slack-claude-agent.
#
# Create the app: https://api.slack.com/apps -> "Create New App" -> "From a manifest".
# Then replace your-tunnel-host.example.com with your tunnel's public hostname and install.
#
# WARNING: these scopes let anyone in an invited channel task an autonomous agent that
# can read and (after plan approval) write files on your machine. groups:history and
# message.groups extend that to private channels. Remove any scope or event you do not
# need, and keep the bot out of channels you do not control. See the README Security section.

display_information:
  name: Claude Remote Worker
features:
  bot_user:
    display_name: Claude
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - groups:history
  pkce_enabled: false
settings:
  event_subscriptions:
    request_url: https://your-tunnel-host.example.com/slack/events
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
    request_url: https://your-tunnel-host.example.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
